name: 국토부 실거래 증분 수집

on:
  schedule:
    # 매월 1일 새벽 3시 KST (= UTC 18:00 전월 마지막일)
    - cron: '0 18 1 * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 증분 수집 실행
        run: npx tsx scripts/collect.ts
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
