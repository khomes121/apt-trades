name: 빌라 과거 데이터 백필 (수동 실행)

# 1회성 백필용. 자동 cron 없음 — GitHub UI 에서 Run workflow 로 수동 실행.
on:
  workflow_dispatch:
    inputs:
      sido:
        description: '시도코드 (26=부산, 11=서울, 비우면 전국). 전국은 일 한도 1만건 초과 위험'
        required: true
        default: '26'
      months:
        description: '몇 개월치 (60=5년, 36=3년, 12=1년)'
        required: true
        default: '60'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GitHub Actions 한도(360) 직전. 5년치 부산 약 2~3시간 예상

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 빌라 거래 백필 (${{ inputs.months }}개월, sido=${{ inputs.sido }})
        run: npx tsx scripts/collect-villa.ts
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          COLLECT_VILLA_SIDO: ${{ inputs.sido }}
          COLLECT_VILLA_MONTHS: ${{ inputs.months }}

      - name: 좌표 지오코딩 백필
        if: success()
        run: npx tsx scripts/geocode-villa.ts
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEOCODE_LIMIT: '20000'

      - name: 실패 로그 커밋
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "logs: 빌라 백필 실패 목록 $(date '+%Y-%m-%d')"
          git push
