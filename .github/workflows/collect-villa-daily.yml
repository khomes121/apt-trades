name: 국토부 빌라(연립다세대) 일별 수집

on:
  schedule:
    # 매일 새벽 5시 KST (= UTC 20:00) — 아파트 daily 완전 종료 후 시작
    - cron: '0 20 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 빌라 일별 수집 + 좌표 백필
        run: npx tsx scripts/collect-villa-daily.ts
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 전국 수집 (COLLECT_VILLA_SIDO 미설정 = 전국)

      - name: 실패 로그 커밋
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "logs: 빌라 일별 수집 실패 목록 $(date '+%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
